{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horizon Admin Login</title>
  <link rel="icon" href="{% static 'img/H.png' %}" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --primary: #000000;
      --primary-hover: #333333;
      --glass-bg: rgba(255, 255, 255, 0.12);
      --glass-border: rgba(255, 255, 255, 0.2);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      --text-light: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.7);
      --input-bg: rgba(255, 255, 255, 0.1);
      --input-border: rgba(255, 255, 255, 0.3);
      --input-focus: rgba(255, 255, 255, 0.5);
    }
    
    body {
      font-family: 'Poppins', 'Segoe UI', sans-serif;
      background: var(--primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    
    /* Background Image */
    .bg-image {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('{% static "img/cars.jpg" %}');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: -2;
    }
    
    /* Dark Overlay */
    .bg-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.85) 0%, rgba(20, 20, 20, 0.75) 50%, rgba(0, 0, 0, 0.9) 100%);
      z-index: -1;
    }
    
    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      animation: fadeInUp 0.6s ease-out;
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .login-box {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: var(--glass-shadow);
    }
    
    .login-logo {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: 6px;
      text-align: center;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .login-sub {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 36px;
      letter-spacing: 1px;
      font-weight: 400;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }
    
    .form-group label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-light);
    }
    
    .form-group input {
      padding: 14px 16px;
      border: 2px solid var(--input-border);
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      background: var(--input-bg);
      color: var(--text-light);
      outline: none;
      transition: all 0.3s ease;
    }
    
    .form-group input::placeholder {
      color: var(--text-muted);
    }
    
    .form-group input:focus {
      border-color: var(--input-focus);
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.1);
    }
    
    .btn-login {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 100%);
      color: #000000;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.3s ease;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
    }
    
    .btn-login:active {
      transform: translateY(0);
    }
    
    .error {
      background: rgba(220, 38, 38, 0.2);
      color: #fca5a5;
      border: 1px solid rgba(220, 38, 38, 0.4);
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 13px;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
    }
    
    .back-link {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
    }
    
    .back-link a {
      color: var(--text-muted);
      font-weight: 500;
      text-decoration: none;
      transition: color 0.3s ease;
    }
    
    .back-link a:hover {
      color: var(--text-light);
    }
    
    /* Decorative corner elements */
    .corner-decor {
      position: fixed;
      width: 200px;
      height: 200px;
      border: 2px solid rgba(255, 255, 255, 0.05);
      pointer-events: none;
    }
    
    .corner-decor.top-right {
      top: 30px;
      right: 30px;
      border-left: none;
      border-bottom: none;
      border-radius: 0 100px 0 0;
    }
    
    .corner-decor.bottom-left {
      bottom: 30px;
      left: 30px;
      border-right: none;
      border-top: none;
      border-radius: 0 0 0 100px;
    }
  </style>
</head>
<body>
  <div class="bg-image"></div>
  <div class="bg-overlay"></div>
  <div class="corner-decor top-right"></div>
  <div class="corner-decor bottom-left"></div>
  
  <div class="login-container">
    <div class="login-box">
      <div class="login-logo">HORIZON</div>
      <p class="login-sub">Admin Panel — Staff Access Only</p>

      {% if messages %}
      {% for message in messages %}
      <div class="error">{{ message }}</div>
      {% endfor %}
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" placeholder="Enter your username" autofocus required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Enter your password" required>
        </div>
        <button class="btn-login" type="submit">Sign In</button>
      </form>
      <div class="back-link"><a href="{% url 'home' %}">← Back to website</a></div>
    </div>
  </div>
</body>
</html>
