{% extends 'horizon/admin_base.html' %}
{% block title %}Edit Order - Horizon Admin{% endblock %}
{% block page_title %}Edit Order #{{ order.pk|stringformat:"05d" }}{% endblock %}

{% block admin_content %}
<div class="panel">
  <div class="panel-header">✏️ Edit Order #{{ order.pk|stringformat:"05d" }}</div>
  <div class="panel-body">
    <form method="post">
      {% csrf_token %}
      <div class="form-grid">
        <div class="form-group">
          <label>Customer</label>
          <input type="text" value="{{ order.customer }}" disabled>
        </div>
        <div class="form-group">
          <label>Vehicle</label>
          <input type="text" value="{{ order.car }}" disabled>
        </div>
        <div class="form-group">
          <label>Amount (₱)</label>
          <input type="number" name="amount" value="{{ order.amount }}" required>
        </div>
        <div class="form-group">
          <label>Payment Method</label>
          <select name="payment_method">
            <option value="cash" {% if order.payment_method == 'cash' %}selected{% endif %}>Cash</option>
            <option value="bank" {% if order.payment_method == 'bank' %}selected{% endif %}>Bank Financing</option>
            <option value="inhouse" {% if order.payment_method == 'inhouse' %}selected{% endif %}>In-house</option>
          </select>
        </div>
        <div class="form-group full">
          <label>Status</label>
          <select name="status">
            <option value="pending" {% if order.status == 'pending' %}selected{% endif %}>Pending</option>
            <option value="confirmed" {% if order.status == 'confirmed' %}selected{% endif %}>Confirmed</option>
            <option value="cancelled" {% if order.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" type="submit">Save Changes</button>
        <a class="btn btn-outline" href="{% url 'admin_orders' %}">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
